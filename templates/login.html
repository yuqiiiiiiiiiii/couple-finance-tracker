<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登入</title>

    <style>
        body{
            font-family: Arial;
            background: #f5f6fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            width:320px;
            text-align:center;
        }

        h1{
            font-size:22px;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        .login-btn{
            background:#4CAF50;
            color:white;
        }

        .login-btn:hover{
            background:#45a049;
        }

        .register-btn{
            background:#3498db;
            color:white;
        }

        .register-btn:hover{
            background:#2980b9;
        }

        .error{
            color:red;
            margin-top:10px;
        }
    </style>

</head>

<body>

<div class="box">

    <h1>💑 共同記帳登入</h1>

    <form method="POST">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="密碼" required>

        <button class="login-btn" type="submit">
            登入
        </button>

    </form>

    <a href="/register-page">
        <button class="register-btn" type="button">
            註冊帳號
        </button>
    </a>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>

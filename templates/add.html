<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新增記帳</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            height:100vh;
            margin:0;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            width:360px;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            margin-bottom:15px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:12px;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
        }

        input:focus, select:focus{
            border-color:#3498db;
            outline:none;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#3498db;
            color:white;
            margin-top:10px;
        }

        button:hover{
            background:#2980b9;
        }

        #msg{
            margin-bottom:10px;
            font-size:14px;
        }

        #expenseFields{
            text-align:left;
        }

        a{
            display:block;
            margin-top:15px;
            color:#555;
            text-decoration:none;
        }

        a:hover{
            color:black;
        }

    </style>
</head>

<body>

<div class="box">

<h2>💑 新增記帳</h2>

<div id="msg"></div>

<form id="recordForm">

    <label>記帳類型</label>
    <select name="record_type" id="record_type">

        <option value="expense">💸 支出</option>
        <option value="income">💵 收入</option>

    </select>

    <input type="number" name="amount" placeholder="金額" required>

    <input type="text" name="category" placeholder="分類" required>

    <input type="text" name="note" placeholder="備註">

    <!-- 支出專用 -->
    <div id="expenseFields">

        <label>開銷類型</label>
        <select name="expense_type">
            <option value="personal">個人支出</option>
            <option value="shared">共同支出</option>
        </select>

        <label>分帳比例</label>
        <input type="number" step="0.1" name="split_ratio" value="0.5">

    </div>

    <button type="submit">新增</button>

</form>

<a href="/">⬅ 回首頁</a>

</div>

<script>

const recordType = document.getElementById("record_type")
const expenseFields = document.getElementById("expenseFields")

recordType.addEventListener("change", ()=>{

    if(recordType.value === "income"){
        expenseFields.style.display = "none"
    }else{
        expenseFields.style.display = "block"
    }
})

document.getElementById("recordForm").addEventListener("submit", async (e)=>{

    e.preventDefault()

    const formData = new FormData(e.target)
    const type = formData.get("record_type")

    const url = type === "income" ? "/income" : "/expenses"

    const res = await fetch(url,{
        method:"POST",
        body:formData
    })

    const data = await res.json()

    document.getElementById("msg").innerText = data.message

    e.target.reset()
})

</script>

</body>
</html>
